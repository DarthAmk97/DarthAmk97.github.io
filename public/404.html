<!doctype html>
<meta charset="utf-8" />
<script>
  const parts = location.pathname.split('/').filter(Boolean);
  const isProjectPage = location.hostname.endsWith('github.io') && parts.length > 1;
  const base = isProjectPage ? `/${parts[0]}/` : '/';
  const appPath = isProjectPage ? `/${parts.slice(1).join('/')}` : location.pathname;
  sessionStorage.redirect = `${appPath || '/'}${location.search}${location.hash}`;
  location.replace(base);
</script>
